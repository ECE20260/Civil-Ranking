<style>

    --jayd-bg: #fefce8;   --jayd-text: #854d0e;   --jayd-border: #fef08a;
    --maqbul-bg: #fff7ed; --maqbul-text: #9a3412; --maqbul-border: #fed7aa;
    --gold: #d4a017; --silver: #94a3b8; --bronze: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #1a3a6e; margin-bottom: 0.2rem; }
  header p { font-size: 0.85rem; color: var(--muted); }
  .grade-legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.25rem; }
  .grade-legend span { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .controls input, .controls select { font-family: 'Cairo', sans-serif; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); outline: none; transition: border-color 0.2s; }
  .controls input { flex: 1; min-width: 160px; }
  .controls input:focus, .controls select:focus { border-color: #3b82f6; }
  .count { font-size: 12px; color: var(--muted); margin-right: auto; }
  .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th { background: #1a3a6e; color: #fff; font-weight: 600; padding: 10px 8px; text-align: right; cursor: pointer; white-space: nowrap; user-select: none; border-left: 1px solid rgba(255,255,255,0.1); transition: background 0.15s; }
  thead th:hover { background: #254fa0; }
  thead th:first-child { border-left: none; }
  tbody tr:nth-child(even) { background: #f8fafc; }
  tbody tr:hover { background: #eff6ff; }
  tbody td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; }
  .rank-cell { text-align: center; font-weight: 700; font-size: 13px; min-width: 36px; }
  .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); } .rank-o { color: var(--muted); font-size: 12px; }
  .name-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .sc { text-align: center; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid; }
  .b-mm { background: var(--mumtaz-bg); color: var(--mumtaz-text); border-color: var(--mumtaz-border); }
  .b-jj { background: var(--jaydj-bg);  color: var(--jaydj-text);  border-color: var(--jaydj-border); }
  .b-j  { background: var(--jayd-bg);   color: var(--jayd-text);   border-color: var(--jayd-border); }
  .b-mq { background: var(--maqbul-bg); color: var(--maqbul-text); border-color: var(--maqbul-border); }
  .bar-wrap { display: flex; align-items: center; gap: 5px; min-width: 100px; }
  .bar-bg { flex: 1; height: 5px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .note { font-size: 10px; color: var(--muted); }
  @media (max-width: 640px) { .yr-cell { display: none; } .name-cell { max-width: 120px; } }
</style>
</head>

const MAX_PER_YEAR = 1500;

function calcScore(s) {
  const yrs = [s.y1, s.y2, s.y3, s.y4];
  const valid = yrs.filter(v => v !== null && v !== undefined);
  if (valid.length === 0) return { total: 0, outOf: 0, pct: 0 };
  const sum = valid.reduce((a, b) => a + b, 0);
  const outOf = valid.length * MAX_PER_YEAR;
  const pct = sum / outOf * 100;
  // scale to 6000
  const scaled = sum / outOf * 6000;
  return { total: parseFloat(scaled.toFixed(2)), outOf: 6000, pct: parseFloat(pct.toFixed(2)), years: valid.length };
}

function getGrade(pct) {
  if (pct >= 89.5) return 'ممتاز';
  if (pct >= 79.5) return 'جيد جدا';
  if (pct >= 69.5) return 'جيد';
  if (pct >= 59.5) return 'مقبول';
  return 'ضعيف';
}
function badgeCls(g) { return g==='ممتاز'?'b-mm':g==='جيد جدا'?'b-jj':g==='جيد'?'b-j':'b-mq'; }
function barColor(g) { return g==='ممتاز'?'#22c55e':g==='جيد جدا'?'#3b82f6':g==='جيد'?'#eab308':'#f97316'; }
function fmt(v) { return v === null || v === undefined ? '—' : v; }

let allData = raw.map(s => {
  const sc = calcScore(s);
  return { ...s, ...sc, grade: getGrade(sc.pct) };
});
allData.sort((a, b) => b.total - a.total);
allData = allData.map((d, i) => ({ ...d, rank: i + 1 }));

let sortCol = 'rank', sortAsc = true;

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => th.style.background = '');
  render();
}

function render() {
  const srch = document.getElementById('srch').value.trim();
  const gr = document.getElementById('grF').value;
  let view = [...allData];
  if (srch) view = view.filter(d => d.name.includes(srch));
  if (gr)   view = view.filter(d => d.grade === gr);

  const cmp = {
    rank:  (a,b) => a.rank - b.rank,
    name:  (a,b) => a.name.localeCompare(b.name, 'ar'),
    y1:    (a,b) => (a.y1||0) - (b.y1||0),
    y2:    (a,b) => (a.y2||0) - (b.y2||0),
    y3:    (a,b) => (a.y3||0) - (b.y3||0),
    y4:    (a,b) => (a.y4||0) - (b.y4||0),
    pct:   (a,b) => a.pct - b.pct,
  };
  if (cmp[sortCol]) view.sort((a, b) => sortAsc ? cmp[sortCol](a,b) : -cmp[sortCol](a,b));

  document.getElementById('cnt').textContent = `إجمالي: ${view.length} طالب`;
  document.getElementById('tbody').innerHTML = view.map(d => {
    const rc = d.rank===1?'rank-1':d.rank===2?'rank-2':d.rank===3?'rank-3':'rank-o';
    const ri = d.rank===1?'🥇':d.rank===2?'🥈':d.rank===3?'🥉':d.rank;
    const barPct = Math.min(100, d.pct).toFixed(1);
    const bc = barColor(d.grade);
    const missingNote = d.years < 4 ? `<span class="note">(${d.years} سنوات)</span>` : '';
    return `<tr>
      <td class="rank-cell ${rc}">${ri}</td>
      <td class="name-cell" title="${d.name}">${d.name}</td>
      <td class="sc yr-cell">${fmt(d.y1)}</td>
      <td class="sc yr-cell">${fmt(d.y2)}</td>
      <td class="sc yr-cell">${fmt(d.y3)}</td>
      <td class="sc yr-cell">${fmt(d.y4)}</td>
      <td>
        <div class="bar-wrap">
          <span style="min-width:48px;font-weight:600;font-size:12px">${d.total.toFixed(1)}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${barPct}%;background:${bc}"></div></div>
          <span style="min-width:42px;font-size:11px;color:var(--muted)">${d.pct.toFixed(1)}%</span>
          ${missingNote}
        </div>
      </td>
      <td><span class="badge ${badgeCls(d.grade)}">${d.grade}</span></td>
    </tr>`;
  }).join('');
}
